<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasky — Your Daily Focus, Organized</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="app-wrapper">
        <header class="app-header">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                        <path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <rect x="3" y="3" width="18" height="18" rx="4" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </div>
                <span class="logo-text">Tasky</span>
            </div>
            <div class="header-meta">
                <span class="date-badge" id="currentDate"></span>
                <button class="theme-toggle" id="themeToggle" title="Toggle theme" aria-label="Toggle light/dark mode">
                    <span class="theme-icon theme-icon-dark">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span>
                    <span class="theme-icon theme-icon-light">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/>
                            <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </span>
                </button>
            </div>
        </header>

        <main class="app-main">
            <div class="hero-section">
                <h1 class="hero-title">Your tasks,<br><em>your rules.</em></h1>
                <p class="hero-sub">Stay sharp. Stay focused. Get it done.</p>
            </div>

            <div class="stats-row">
                <div class="stat-chip">
                    <span class="stat-num" id="totalCount">0</span>
                    <span class="stat-label">Total</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-chip">
                    <span class="stat-num" id="doneCount">0</span>
                    <span class="stat-label">Done</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-chip">
                    <span class="stat-num" id="pendingCount">0</span>
                    <span class="stat-label">Pending</span>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
                        <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                    </svg>
                    <input 
                        type="text" 
                        id="taskInput" 
                        class="task-input" 
                        placeholder="Add a new task…"
                        autocomplete="off"
                    />
                </div>
                <button class="add-btn" id="addBtn">
                    <span>Add Task</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>

            <div class="filter-tabs">
                <button class="tab active" data-filter="all">All</button>
                <button class="tab" data-filter="pending">Pending</button>
                <button class="tab" data-filter="done">Completed</button>
            </div>

            <div class="task-list-container">
                <ol class="task-list" id="taskList"></ol>
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">✦</div>
                    <p>No tasks yet. Add one above!</p>
                </div>
            </div>

            <div class="footer-actions" id="footerActions" style="display:none;">
                <button class="clear-btn" id="clearDoneBtn">Clear completed</button>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
